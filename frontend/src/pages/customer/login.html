<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshMart — Login</title>
  <!-- bootstrap css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- google fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* base — light grey background matching the rest of the customer portal */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }

    /* navbar — identical to all other customer pages */
    .top-nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0.75rem 2rem; display: flex; align-items: center; gap: 1rem; }
    .logo-block { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; flex-shrink: 0; }
    .logo-icon { width: 42px; height: 42px; background: #2e7d32; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .logo-text strong { display: block; font-size: 1.05rem; color: #1a1a1a; line-height: 1.1; }
    .logo-text span { font-size: 0.72rem; color: #888; }
    .search-bar { flex: 1; max-width: 580px; display: flex; align-items: center; border: 1.5px solid #ddd; border-radius: 8px; padding: 0.45rem 0.9rem; gap: 0.5rem; }
    .search-bar input { border: none; outline: none; font-size: 0.9rem; color: #333; width: 100%; font-family: 'Inter', sans-serif; }
    .search-bar input::placeholder { color: #aaa; }
    .nav-actions { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
    .btn-login-nav { background: none; border: none; font-size: 0.9rem; color: #333; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; text-decoration: none; }
    .btn-signup { background: #2e7d32; color: #fff; border: none; border-radius: 8px; padding: 0.45rem 1.1rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; transition: background 0.15s; }
    .btn-signup:hover { background: #1b5e20; color: #fff; }

    /* secondary nav row */
    .sub-nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 2rem; display: flex; gap: 0.25rem; }
    .sub-nav a { text-decoration: none; font-size: 0.9rem; font-weight: 500; color: #555; padding: 0.65rem 1rem; border-bottom: 2px solid transparent; transition: color 0.15s; }
    .sub-nav a:hover { color: #2e7d32; }

    /* page body — vertically centres the login card */
    .page-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2.5rem 1.5rem; }

    /* login card */
    .login-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }

    /* logo at top of card */
    .card-logo { display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin-bottom: 1.5rem; text-decoration: none; }
    .card-logo-icon { width: 44px; height: 44px; background: #2e7d32; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .card-logo-text strong { font-size: 1.2rem; color: #1a1a1a; }
    .card-logo-text span { font-size: 0.75rem; color: #888; display: block; text-align: left; }

    /* card heading and subtitle */
    .card-title { font-size: 1.3rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.3rem; text-align: center; }
    .card-sub   { font-size: 0.85rem; color: #888; text-align: center; margin-bottom: 1.75rem; }

    /* form labels and inputs */
    .form-label { font-size: 0.875rem; font-weight: 600; color: #1a1a1a; margin-bottom: 0.4rem; display: block; }
    .form-group { margin-bottom: 1.1rem; }
    .form-input { width: 100%; border: 1.5px solid #ddd; border-radius: 8px; padding: 0.6rem 0.85rem; font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.15s; color: #1a1a1a; }
    .form-input:focus { border-color: #2e7d32; }

    /* password field wrapper — needed for the show/hide toggle */
    .password-wrap { position: relative; }
    .toggle-pw { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1rem; color: #aaa; padding: 0; }
    .toggle-pw:hover { color: #555; }

    /* error message shown when login fails */
    .error-msg { background: #fdecea; border: 1px solid #f5c6c6; border-radius: 8px; padding: 0.6rem 0.85rem; font-size: 0.82rem; color: #c62828; margin-bottom: 1rem; display: none; }
    .error-msg.show { display: block; }

    /* success message shown on valid login before redirect */
    .success-msg { background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 8px; padding: 0.6rem 0.85rem; font-size: 0.82rem; color: #2e7d32; margin-bottom: 1rem; display: none; }
    .success-msg.show { display: block; }

    /* remember me checkbox row */
    .remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .remember-label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: #555; cursor: pointer; }
    .remember-label input { accent-color: #2e7d32; width: 15px; height: 15px; cursor: pointer; }
    .forgot-link { font-size: 0.82rem; color: #2e7d32; text-decoration: none; font-weight: 500; }
    .forgot-link:hover { text-decoration: underline; }

    /* main login button */
    .btn-submit { width: 100%; background: #2e7d32; color: #fff; border: none; border-radius: 10px; padding: 0.75rem; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .btn-submit:hover { background: #1b5e20; transform: scale(1.01); }
    /* spinner shown while "logging in" */
    .btn-submit.loading { opacity: 0.7; pointer-events: none; }

    /* divider between login button and demo credentials */
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e5e5; }
    .divider span { font-size: 0.78rem; color: #aaa; white-space: nowrap; }

    /* demo credential buttons — quick-fill for testing */
    .demo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1.25rem; }
    .demo-btn { background: #f5f5f5; border: 1px solid #e5e5e5; border-radius: 8px; padding: 0.5rem 0.4rem; font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 500; color: #555; cursor: pointer; text-align: center; transition: background 0.15s, border-color 0.15s; line-height: 1.3; }
    .demo-btn:hover { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }
    .demo-btn strong { display: block; font-size: 0.78rem; color: #1a1a1a; margin-bottom: 0.15rem; }

    /* sign up link at the bottom of the card */
    .signup-row { text-align: center; font-size: 0.82rem; color: #888; margin-top: 1.25rem; }
    .signup-row a { color: #2e7d32; font-weight: 600; text-decoration: none; }
    .signup-row a:hover { text-decoration: underline; }

    /* role badge shown inside success message to confirm which portal the user is going to */
    .role-badge { display: inline-block; background: #2e7d32; color: #fff; border-radius: 999px; font-size: 0.72rem; font-weight: 700; padding: 0.15rem 0.55rem; margin-left: 0.3rem; }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.25rem; }
      .top-nav .search-bar { display: none; }
      .demo-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- navbar -->
  <nav class="top-nav">
    <a href="../../index.html" class="logo-block">
      <div class="logo-icon">🛒</div>
      <div class="logo-text"><strong>FreshMart</strong><span>Online Supermarket</span></div>
    </a>
    <div class="search-bar"><span style="color:#aaa">🔍</span><input type="text" placeholder="Search for products..."></div>
    <div class="nav-actions">
      <a href="login.html" class="btn-login-nav">Login</a>
      <a href="signup.html" class="btn-signup">Sign Up</a>
      <button style="background:none;border:none;font-size:1.2rem;cursor:pointer">🤍</button>
      <button style="background:none;border:none;font-size:0.85rem;color:#333;cursor:pointer;font-family:'Inter',sans-serif">🎁 Orders</button>
      <a href="basket.html" style="background:#2e7d32;color:#fff;border:none;border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;text-decoration:none">🛒</a>
    </div>
  </nav>

  <!-- secondary nav -->
  <div class="sub-nav">
    <a href="index.html">Shop</a>
    <a href="products.html">Offers</a>
    <a href="products.html">Categories</a>
  </div>

  <!-- login card centred on page -->
  <div class="page-body">
    <div class="login-card">

      <!-- freshmart logo inside the card -->
      <a href="../../index.html" class="card-logo">
        <div class="card-logo-icon">🛒</div>
        <div class="card-logo-text"><strong>FreshMart</strong><span>Online Supermarket</span></div>
      </a>

      <h1 class="card-title">Welcome back</h1>
      <p class="card-sub">Sign in to your FreshMart account</p>

      <!-- error and success messages — shown/hidden by js -->
      <div class="error-msg"   id="errorMsg">❌ Incorrect email or password. Please try again.</div>
      <div class="success-msg" id="successMsg"></div>

      <!-- login form — submit handled by js, no page reload -->
      <form onsubmit="handleLogin(event)">

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <!-- password field with show/hide toggle button -->
          <div class="password-wrap">
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggleBtn" title="Show/hide password">👁️</button>
          </div>
        </div>

        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
      </form>

      <!-- divider before demo credentials -->
      <div class="divider"><span>demo accounts</span></div>

      <!-- quick-fill buttons for each test user — useful for development and marking -->
      <div class="demo-grid">
        <button class="demo-btn" onclick="fillDemo('dave@freshmart.com','customer123')">
          <strong>👤 Dave</strong>Customer
        </button>
        <button class="demo-btn" onclick="fillDemo('sarah@freshmart.com','warehouse123')">
          <strong>📦 Sarah</strong>Warehouse
        </button>
        <button class="demo-btn" onclick="fillDemo('emma@freshmart.com','manager123')">
          <strong>📊 Emma</strong>Management
        </button>
      </div>

      <div class="signup-row">Don't have an account? <a href="signup.html">Sign up for free</a></div>

    </div>
  </div>

  <!-- bootstrap js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* hardcoded users — replace with fetch('/api/auth/login') when backend is ready
       each user has an email, password, role and the portal they should be sent to */
    const USERS = [
      { email: 'dave@freshmart.com',  password: 'customer123',  role: 'Customer',   redirect: 'index.html'                                    },
      { email: 'sarah@freshmart.com', password: 'warehouse123', role: 'Warehouse',  redirect: '../warehouse/index.html'                       },
      { email: 'emma@freshmart.com',  password: 'manager123',   role: 'Management', redirect: '../management/index.html'                      },
      { email: 'admin@freshmart.com', password: 'admin123',     role: 'Admin',      redirect: '../../index.html'                              },
    ];

    /* fills the email and password fields when a demo button is clicked */
    function fillDemo(email, pw) {
      document.getElementById('email').value    = email;
      document.getElementById('password').value = pw;
      /* hide any previous error messages when demo credentials are filled */
      document.getElementById('errorMsg').classList.remove('show');
    }

    /* toggles password field between visible text and hidden dots */
    function togglePassword() {
      const input = document.getElementById('password');
      const btn   = document.getElementById('toggleBtn');
      input.type  = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    }

    /* handles form submission — checks credentials against the users array */
    function handleLogin(e) {
      e.preventDefault(); /* prevents the default browser form submission / page reload */

      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const btn      = document.getElementById('submitBtn');

      /* hide previous messages before attempting login */
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      /* find a matching user — case-insensitive email comparison */
      const user = USERS.find(u => u.email.toLowerCase() === email && u.password === password);

      if (!user) {
        /* no match found — show error message */
        errorMsg.classList.add('show');
        return;
      }

      /* valid login — show loading state on the button */
      btn.textContent = 'Signing in...';
      btn.classList.add('loading');

      /* save logged-in user to localstorage so other pages know who is signed in
         if remember me is checked, use localstorage (persists), otherwise sessionStorage (clears on tab close) */
      const storage = remember ? localStorage : sessionStorage;
      storage.setItem('fm_user', JSON.stringify({ email: user.email, role: user.role, name: email.split('@')[0] }));

      /* show success message with the user's role before redirecting */
      successMsg.innerHTML = `✅ Welcome back! Redirecting to <span class="role-badge">${user.role}</span> portal...`;
      successMsg.classList.add('show');

      /* short delay so the user sees the success message before being redirected */
      setTimeout(() => { window.location.href = user.redirect; }, 1200);
    }

    /* if user is already logged in, redirect them straight to their portal */
    const existing = JSON.parse(localStorage.getItem('fm_user') || sessionStorage.getItem('fm_user') || 'null');
    if (existing) {
      const match = USERS.find(u => u.email === existing.email);
      if (match) window.location.href = match.redirect;
    }
  </script>
</body>
</html>
