<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshMart – Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #2d7a3a;
      --green-dark:  #1f5a29;
      --green-light: #e8f5eb;
      --green-mid:   #c6e8cc;
      --accent:      #f4a623;
      --text:        #1a1a1a;
      --muted:       #6b7280;
      --border:      #e5e7eb;
      --bg:          #f5f5f5;
      --white:       #ffffff;
      --red:         #e53e3e;
      --radius:      12px;
      --shadow:      0 2px 8px rgba(0,0,0,.08);
      --shadow-md:   0 4px 16px rgba(0,0,0,.12);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .nav-top {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: var(--green);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text { line-height: 1.1; }
    .logo-text strong { font-size: 16px; font-weight: 800; color: var(--text); }
    .logo-text span   { font-size: 11px; color: var(--muted); display: block; }

    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f3f4f6;
      border-radius: 24px;
      padding: 8px 16px;
      gap: 8px;
      border: 1px solid var(--border);
      transition: border-color .2s;
    }
    .search-bar:focus-within { border-color: var(--green); background: var(--white); }
    .search-bar input { border: none; background: transparent; outline: none; font-family: inherit; font-size: 14px; width: 100%; }

    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .btn-ghost { background: none; border: none; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 12px; border-radius: 8px; color: var(--text); transition: background .15s; }
    .btn-ghost:hover { background: #f3f4f6; }
    .btn-primary { background: var(--green); color: #fff; border: none; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; padding: 8px 18px; border-radius: 8px; transition: background .15s; }
    .btn-primary:hover { background: var(--green-dark); }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: 20px; padding: 6px; border-radius: 8px; transition: background .15s; position: relative; }
    .icon-btn:hover { background: #f3f4f6; }
    .badge {
      position: absolute; top: 2px; right: 2px;
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 700;
      border-radius: 99px; min-width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }

    .nav-bottom {
      display: flex;
      gap: 4px;
      padding-bottom: 0;
    }
    .nav-tab {
      font-size: 14px; font-weight: 600;
      padding: 10px 16px;
      border: none; background: none;
      cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      font-family: inherit;
    }
    .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }
    .nav-tab:hover:not(.active) { color: var(--text); }

    /* ── PAGE LAYOUT ── */
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
      position: sticky;
      top: 104px;
    }
    .sidebar-title {
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .cat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s, color .15s;
    }
    .cat-item:hover { background: var(--green-light); color: var(--green); }
    .cat-item.active { background: var(--green-light); color: var(--green); border-left-color: var(--green); }
    .cat-item .cat-emoji { font-size: 18px; width: 24px; text-align: center; }
    .cat-count { margin-left: auto; font-size: 11px; background: var(--border); border-radius: 99px; padding: 1px 7px; color: var(--muted); font-weight: 700; }
    .cat-item.active .cat-count { background: var(--green-mid); color: var(--green-dark); }

    /* ── MAIN CONTENT ── */
    .main { display: flex; flex-direction: column; gap: 20px; }

    /* breadcrumb */
    .breadcrumb { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .breadcrumb a { color: var(--green); text-decoration: none; font-weight: 600; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; }
    .result-count { font-size: 14px; font-weight: 700; }
    .result-count span { color: var(--muted); font-weight: 500; }

    .filter-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 99px; padding: 5px 12px;
      font-size: 12.5px; font-weight: 600;
      cursor: pointer; color: var(--text);
      font-family: inherit;
      transition: border-color .15s, background .15s;
    }
    .filter-chip:hover { border-color: var(--green); color: var(--green); }
    .filter-chip.active { background: var(--green); color: #fff; border-color: var(--green); }

    .sort-select {
      margin-left: auto;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 12px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; color: var(--text);
      outline: none;
    }
    .sort-select:focus { border-color: var(--green); }

    /* offer banner */
    .offer-banner {
      background: linear-gradient(120deg, #1f5a29 0%, #2d7a3a 60%, #3a9a49 100%);
      border-radius: var(--radius);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      color: #fff;
    }
    .offer-banner .offer-emoji { font-size: 32px; }
    .offer-banner h3 { font-size: 16px; font-weight: 800; }
    .offer-banner p { font-size: 13px; opacity: .85; margin-top: 2px; }
    .offer-tag {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 13px; font-weight: 800;
      border-radius: 8px; padding: 6px 14px;
      white-space: nowrap;
    }

    /* product grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow .2s, transform .2s;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .product-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .product-badge {
      position: absolute;
      top: 10px; left: 10px;
      font-size: 10px; font-weight: 800;
      border-radius: 6px;
      padding: 3px 8px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-sale  { background: #fee2e2; color: var(--red); }
    .badge-new   { background: #dbeafe; color: #1d4ed8; }
    .badge-offer { background: #fef3c7; color: #92400e; }
    .badge-org   { background: #d1fae5; color: #065f46; }

    .wishlist-btn {
      position: absolute; top: 8px; right: 8px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 50%; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; cursor: pointer;
      transition: background .15s, border-color .15s;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    .wishlist-btn:hover { background: #fee2e2; border-color: #fca5a5; }
    .wishlist-btn.active { background: #fee2e2; border-color: #fca5a5; }

    .product-img-wrap {
      padding: 20px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 130px;
      background: #fafafa;
    }
    .product-img { font-size: 62px; line-height: 1; }

    .product-info { padding: 10px 14px 14px; flex: 1; display: flex; flex-direction: column; }
    .product-brand { font-size: 10.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .product-name  { font-size: 13.5px; font-weight: 700; margin: 2px 0 4px; line-height: 1.3; }
    .product-weight { font-size: 11.5px; color: var(--muted); margin-bottom: 8px; }
    .product-rating { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
    .stars { color: var(--accent); font-size: 11px; }
    .rating-count { font-size: 11px; color: var(--muted); }

    .product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .price-block {}
    .price-orig { font-size: 11px; color: var(--muted); text-decoration: line-through; }
    .price-main { font-size: 16px; font-weight: 800; color: var(--text); }
    .price-main.sale { color: var(--red); }

    .add-btn {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      width: 32px; height: 32px;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-family: inherit;
      font-weight: 300;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }
    .add-btn:hover { background: var(--green-dark); transform: scale(1.1); }

    .qty-ctrl {
      display: flex; align-items: center; gap: 6px;
    }
    .qty-btn {
      background: var(--green-light); color: var(--green);
      border: 1px solid var(--green-mid);
      border-radius: 6px; width: 26px; height: 26px;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      font-weight: 700;
    }
    .qty-btn:hover { background: var(--green-mid); }
    .qty-num { font-size: 14px; font-weight: 800; min-width: 18px; text-align: center; }

    /* pagination */
    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 0 4px;
    }
    .page-btn {
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--white);
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s, color .15s;
    }
    .page-btn:hover { border-color: var(--green); color: var(--green); }
    .page-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
    .page-btn:disabled { opacity: .4; cursor: default; }

    /* toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--green-dark); color: #fff;
      font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
      padding: 12px 22px; border-radius: 99px;
      box-shadow: 0 6px 24px rgba(0,0,0,.18);
      pointer-events: none;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
      .sidebar { position: static; display: flex; flex-wrap: nowrap; overflow-x: auto; border-radius: var(--radius); }
      .sidebar-title { display: none; }
      .cat-item { white-space: nowrap; flex-shrink: 0; border-left: none; border-bottom: 3px solid transparent; }
      .cat-item.active { border-bottom-color: var(--green); border-left: none; }
    }
  </style>
</head>

  <!-- MAIN -->
  <main class="main">

    <div class="breadcrumb">

    <!-- Toolbar -->

    <!-- Product Grid -->

    <!-- Pagination -->

      <button class="page-btn" id="nextBtn" onclick="changePage(1)">›</button>

  </main>
</div>

// ── STATE ──
let cart = {};
let wishlist = new Set();
let currentCat = 'all';
let currentFilters = { inStock: true, onSale: false, organic: false };
let currentSort = 'default';
let searchQuery = '';
let currentPage = 1;
const PER_PAGE = 16;

// ── HELPERS ──
function stars(r) {
  const full = Math.floor(r);
  const half = r - full >= 0.5;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half?1:0));
}

function cartTotal() { return Object.values(cart).reduce((s,v)=>s+v,0); }

function updateCartBadge() {
  const el = document.getElementById('cartCount');
  const n = cartTotal();
  el.textContent = n;
  el.style.display = n === 0 ? 'none' : 'flex';
}

function showToast(msg = '🛒 Added to basket!') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=> t.classList.remove('show'), 2200);
}

// ── FILTER / SORT ──
function getFiltered() {
  let list = PRODUCTS.slice();
  if (currentCat !== 'all') list = list.filter(p => p.cat === currentCat);
  if (currentFilters.onSale) list = list.filter(p => p.orig !== null);
  if (currentFilters.organic) list = list.filter(p => p.organic);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));
  }
  // sort
  if (currentSort === 'price-asc')  list.sort((a,b) => a.price - b.price);
  if (currentSort === 'price-desc') list.sort((a,b) => b.price - a.price);
  if (currentSort === 'rating')     list.sort((a,b) => b.rating - a.rating);
  if (currentSort === 'name')       list.sort((a,b) => a.name.localeCompare(b.name));
  return list;
}

// ── RENDER ──
function render() {
  const filtered = getFiltered();
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > pages) currentPage = pages;
  const slice = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  document.getElementById('resultCount').innerHTML = `${total} <span>product${total!==1?'s':''} found</span>`;

  // update pagination
  for(let i=1;i<=3;i++){
    const btn = document.getElementById('p'+i);
    btn.style.display = i <= pages ? 'flex' : 'none';
    btn.classList.toggle('active', i === currentPage);
    btn.textContent = i;
  }
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= pages;

  const grid = document.getElementById('productGrid');
  if (slice.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:12px">🔍</div>
      <div style="font-size:16px;font-weight:700">No products found</div>
      <div style="font-size:13px;margin-top:4px">Try adjusting your filters or search term</div>
    </div>`;
    return;
  }

  grid.innerHTML = slice.map(p => {
    const qty = cart[p.id] || 0;
    const inWish = wishlist.has(p.id);
    const badgeHTML = p.badge
      ? `<span class="product-badge badge-${p.badge==='org'?'org':p.badge==='new'?'new':p.badge==='sale'?'sale':'offer'}">${p.badge==='org'?'Organic':p.badge==='new'?'New':p.badge==='sale'?'Sale':'Offer'}</span>`
      : '';
    const origHTML = p.orig ? `<div class="price-orig">£${p.orig.toFixed(2)}</div>` : '';
    const priceClass = p.orig ? 'price-main sale' : 'price-main';

    const ctrlHTML = qty === 0
      ? `<button class="add-btn" onclick="addToCart(${p.id})" title="Add to basket">+</button>`
      : `<div class="qty-ctrl">
          <button class="qty-btn" onclick="removeFromCart(${p.id})">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="addToCart(${p.id})">+</button>
        </div>`;

    return `<div class="product-card" id="card-${p.id}">
      ${badgeHTML}
      <button class="wishlist-btn ${inWish?'active':''}" onclick="toggleWish(${p.id})" title="Wishlist">${inWish?'❤️':'🤍'}</button>
      <div class="product-img-wrap"><div class="product-img">${p.emoji}</div></div>
      <div class="product-info">
        <div class="product-brand">${p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-weight">${p.weight}</div>
        <div class="product-rating">
          <span class="stars">${'★'.repeat(Math.round(p.rating))}${'☆'.repeat(5-Math.round(p.rating))}</span>
          <span class="rating-count">(${(p.reviews>=1000?(p.reviews/1000).toFixed(1)+'k':p.reviews)})</span>
        </div>
        <div class="product-footer">
          <div class="price-block">
            ${origHTML}
            <div class="${priceClass}">£${p.price.toFixed(2)}</div>
          </div>
          ${ctrlHTML}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── ACTIONS ──
function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartBadge();
  showToast('🛒 Added to basket!');
  reRenderCard(id);
}
function removeFromCart(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id] === 0) delete cart[id];
  updateCartBadge();
  reRenderCard(id);
}
function reRenderCard(id) {
  // just re-render the footer of the card
  render();
}
function toggleWish(id) {
  wishlist.has(id) ? wishlist.delete(id) : wishlist.add(id);
  render();
}
function filterCategory(cat, btn) {
  currentCat = cat;
  currentPage = 1;
  document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('breadCat').textContent = cat === 'all' ? 'All Products' : cat;
  render();
}
function toggleFilter(btn, key) {
  currentFilters[key] = !currentFilters[key];
  btn.classList.toggle('active', currentFilters[key]);
  currentPage = 1;
  render();
}
function sortProducts(val) {
  currentSort = val;
  currentPage = 1;
  render();
}
function handleSearch(val) {
  searchQuery = val;
  currentPage = 1;
  render();
}
function changePage(dir) {
  const filtered = getFiltered();
  const pages = Math.ceil(filtered.length / PER_PAGE);
  currentPage = Math.max(1, Math.min(pages, currentPage + dir));
  render();
}
function goPage(n) {
  currentPage = n;
  render();
}

// ── INIT ──
updateCartBadge();
render();
</script>
