<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshMart — Shopping Cart</title>
  <!-- bootstrap css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- google fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* base reset — light grey background matching the figma design */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #1a1a1a; }

    /* navbar — sticky white bar at the top, identical to other customer pages */
    .top-nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0.75rem 2rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; }
    .logo-block { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; flex-shrink: 0; }
    .logo-icon { width: 42px; height: 42px; background: #2e7d32; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .logo-text strong { display: block; font-size: 1.05rem; color: #1a1a1a; line-height: 1.1; }
    .logo-text span { font-size: 0.72rem; color: #888; }
    .search-bar { flex: 1; max-width: 580px; display: flex; align-items: center; border: 1.5px solid #ddd; border-radius: 8px; padding: 0.45rem 0.9rem; gap: 0.5rem; }
    .search-bar input { border: none; outline: none; font-size: 0.9rem; color: #333; width: 100%; font-family: 'Inter', sans-serif; }
    .search-bar input::placeholder { color: #aaa; }
    .nav-actions { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
    .btn-login { background: none; border: none; font-size: 0.9rem; color: #333; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; }
    .btn-signup { background: #2e7d32; color: #fff; border: none; border-radius: 8px; padding: 0.45rem 1.1rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s; }
    .btn-signup:hover { background: #1b5e20; }
    .nav-icon-btn { background: none; border: none; font-size: 0.85rem; color: #333; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; font-family: 'Inter', sans-serif; }
    /* cart button — red badge shows live item count (asked ai for this) */
    .cart-btn-wrap { position: relative; }
    .cart-btn { background: #2e7d32; color: #fff; border: none; border-radius: 8px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .cart-btn:hover { background: #1b5e20; }
    .cart-badge { position: absolute; top: -6px; right: -6px; background: #e53935; color: #fff; border-radius: 50%; font-size: 0.65rem; font-weight: 700; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }

    /* second nav row — shop, offers, categories tabs */
    .sub-nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 2rem; display: flex; gap: 0.25rem; }
    .sub-nav a { text-decoration: none; font-size: 0.9rem; font-weight: 500; color: #555; padding: 0.65rem 1rem; border-bottom: 2px solid transparent; transition: color 0.15s; }
    .sub-nav a:hover { color: #2e7d32; }

    /* page layout */
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem; }
    .page-subtitle { font-size: 0.9rem; color: #2e7d32; margin-bottom: 1.5rem; }

    /* two-column grid: basket items left, order summary right */
    .basket-layout { display: grid; grid-template-columns: 1fr 360px; gap: 1.5rem; align-items: start; }

    /* free delivery progress banner above the basket panel */
    .delivery-banner { background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 8px; padding: 0.65rem 0.9rem; font-size: 0.8rem; color: #2e7d32; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }

    /* basket items panel — white card containing all item rows */
    .basket-panel { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; }
    .basket-item { display: flex; align-items: center; gap: 1.25rem; padding: 1.25rem 1.5rem; border-bottom: 1px solid #f0f0f0; animation: fadeUp 0.3s ease both; }
    .basket-item:last-of-type { border-bottom: none; }

    /* product image, name, category and price */
    .item-img { width: 60px; height: 60px; background: #f5f5f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name  { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.15rem; }
    .item-cat   { font-size: 0.8rem; color: #2e7d32; margin-bottom: 0.3rem; }
    .item-price { font-size: 0.95rem; font-weight: 700; color: #2e7d32; }

    /* quantity control: minus | number | plus */
    .qty-ctrl { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    .qty-btn  { width: 36px; height: 36px; border: none; background: #fff; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; font-weight: 600; }
    .qty-btn:hover { background: #f0f0f0; }
    .qty-num  { width: 40px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 600; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }

    /* red bin button to remove an item entirely */
    .remove-btn { background: none; border: none; color: #e53935; font-size: 1.1rem; cursor: pointer; padding: 0.25rem; border-radius: 6px; transition: background 0.15s; flex-shrink: 0; }
    .remove-btn:hover { background: #fdecea; }

    /* item total row at the bottom of the basket panel */
    .item-total-row { display: flex; justify-content: flex-end; padding: 0.85rem 1.5rem; background: #fafafa; border-top: 1px solid #f0f0f0; font-size: 0.9rem; color: #555; }
    .item-total-row strong { color: #1a1a1a; margin-left: 0.25rem; }

    /* empty state — shown when no items in basket */
    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .empty-state p  { font-size: 0.875rem; color: #888; margin-bottom: 1.5rem; }
    .btn-shop { background: #2e7d32; color: #fff; border: none; border-radius: 8px; padding: 0.65rem 1.5rem; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.15s; }
    .btn-shop:hover { background: #1b5e20; color: #fff; }

    /* order summary panel — on the right */
    .summary-panel { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; position: sticky; top: 80px; }
    .summary-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.25rem; }

    /* summary rows — label left, value right */
    .summary-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; color: #555; margin-bottom: 0.85rem; }
    .summary-row.total { border-top: 1px solid #e5e5e5; padding-top: 0.85rem; margin-top: 0.25rem; font-size: 1rem; font-weight: 700; color: #1a1a1a; }
    .val-green { color: #2e7d32; font-weight: 600; }
    .val-red   { color: #e53935; font-weight: 600; }
    .val-free  { color: #2e7d32; font-weight: 700; font-size: 0.85rem; }
    .summary-divider { height: 1px; background: #e5e5e5; margin: 0.85rem 0; }

    /* promo code input + apply button (asked ai for this) */
    .promo-label { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
    .promo-wrap  { display: flex; gap: 0.5rem; margin-bottom: 0.25rem; }
    .promo-input { flex: 1; border: 1.5px solid #ddd; border-radius: 8px; padding: 0.5rem 0.75rem; font-family: 'Inter', sans-serif; font-size: 0.875rem; outline: none; transition: border-color 0.15s; }
    .promo-input:focus { border-color: #2e7d32; }
    .promo-btn   { background: #2e7d32; color: #fff; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .promo-btn:hover { background: #1b5e20; }
    /* success = green, error = red feedback message (asked ai to help me) */
    .promo-msg { font-size: 0.78rem; margin-top: 0.35rem; min-height: 1rem; }
    .promo-msg.success { color: #2e7d32; }
    .promo-msg.error   { color: #e53935; }

    /* checkout and continue shopping buttons */
    .btn-checkout { width: 100%; background: #2e7d32; color: #fff; border: none; border-radius: 10px; padding: 0.85rem; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 1rem; text-decoration: none; display: block; text-align: center; transition: background 0.15s, transform 0.1s; }
    .btn-checkout:hover { background: #1b5e20; color: #fff; transform: scale(1.01); }
    .btn-continue { width: 100%; background: #fff; color: #1a1a1a; border: 1.5px solid #ddd; border-radius: 10px; padding: 0.75rem; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; margin-top: 0.65rem; text-decoration: none; display: block; text-align: center; transition: background 0.15s; }
    .btn-continue:hover { background: #f5f5f5; color: #1a1a1a; }

    /* slide-up entrance animation for basket items (asked ai for this) */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* for  mobile: stack columns vertically and hide search bar */
    @media (max-width: 768px) {
      .basket-layout { grid-template-columns: 1fr; }
      .summary-panel { position: static; }
      .top-nav .search-bar { display: none; }
    }
  </style>
</head>
<body>

  <!-- navbar -->
  <nav class="top-nav">
    <a href="../../index.html" class="logo-block">
      <div class="logo-icon">🛒</div>
      <div class="logo-text"><strong>FreshMart</strong><span>Online Supermarket</span></div>
    </a>
    <div class="search-bar"><span style="color:#aaa">🔍</span><input type="text" placeholder="Search for products..."></div>
    <div class="nav-actions">
      <a href="login.html" class="btn-login-nav">Login</a>
      <a href="signup.html" class="btn-signup">Sign Up</a>
      <button class="nav-icon-btn">🤍</button>
      <button class="nav-icon-btn">🎁 Orders</button>
      <!-- cart badge count updated by js on load -->
      <div class="cart-btn-wrap">
        <a href="basket.html" class="cart-btn">🛒</a>
        <span class="cart-badge" id="cartBadge">0</span>
      </div>
    </div>
  </nav>

  <!-- secondary nav -->
  <div class="sub-nav">
    <a href="index.html">Shop</a>
    <a href="products.html">Offers</a>
    <a href="products.html">Categories</a>
  </div>

  <!-- page content -->
  <div class="page-wrap">
    <h1 class="page-title">Shopping Cart</h1>
    <p class="page-subtitle" id="itemCountLabel">0 items in your cart</p>

    <div class="basket-layout">

      <!-- left column: delivery banner + basket items -->
      <div>
        <!-- updates to show how much more is needed for free delivery -->
        <div class="delivery-banner">🚚 <span id="deliveryMsg">Add £50.00 more for free delivery!</span></div>
        <!-- basket item rows injected here by render() -->
        <div class="basket-panel" id="basketPanel"></div>
      </div>

      <!-- right column: order summary -->
      <div class="summary-panel">
        <div class="summary-title">Order Summary</div>
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">£0.00</span></div>
        <div class="summary-row"><span>VAT (20%)</span><span id="vat">£0.00</span></div>
        <div class="summary-divider"></div>

        <!-- promo code — valid codes: SAVE10, FRESH5, WELCOME -->
        <div class="promo-label">Promo Code</div>
        <div class="promo-wrap">
          <input type="text" class="promo-input" id="promoInput" placeholder="e.g. SAVE10">
          <button class="promo-btn" onclick="applyPromo()">Apply</button>
        </div>
        <div class="promo-msg" id="promoMsg"></div>
        <div class="summary-divider"></div>

        <div class="summary-row"><span>Discount</span><span class="val-red" id="discount">-£0.00</span></div>
        <div class="summary-row"><span>Delivery</span><span id="delivery" class="val-free">FREE</span></div>
        <div class="summary-row total"><span>Total</span><span class="val-green" id="total">£0.00</span></div>

        <!-- disabled when basket is empty via js -->
        <a href="checkout.html" class="btn-checkout" id="checkoutBtn">Proceed to Checkout →</a>
        <a href="products.html" class="btn-continue">Continue Shopping</a>
      </div>

    </div>
  </div>

  <!-- bootstrap js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* product catalogue — replace with fetch('/api/products') when backend is ready, temporary holder */
    const PRODUCTS = [
      { id:1,  emoji:'🍫', name:'Protein Bar, Variety Pack', cat:'Breakfast',  price:21.99 },
      { id:2,  emoji:'🍞', name:'Sourdough Loaf',            cat:'Bakery',     price:2.49  },
      { id:3,  emoji:'🍓', name:'Strawberries',              cat:'Fruit',      price:3.49  },
      { id:4,  emoji:'🧀', name:'Cheddar Cheese',            cat:'Dairy',      price:3.49  },
      { id:5,  emoji:'🍗', name:'Chicken Breast',            cat:'Meat',       price:4.99  },
      { id:6,  emoji:'🍎', name:'Gala Apples',               cat:'Fruit',      price:2.49  },
      { id:7,  emoji:'🥛', name:'Whole Milk',                cat:'Dairy',      price:1.45  },
      { id:8,  emoji:'🥦', name:'Broccoli',                  cat:'Vegetables', price:0.89  },
      { id:9,  emoji:'🍌', name:'Ripe Bananas',              cat:'Fruit',      price:1.29  },
      { id:10, emoji:'🥚', name:'Free Range Eggs',           cat:'Dairy',      price:2.79  },
    ];

    /* valid promo codes and their discount percentages — replace with api call when backend ready */
    const PROMO_CODES = { 'SAVE10': 10, 'FRESH5': 5, 'WELCOME': 15 };

    /* constants for delivery and tax logic */
    const FREE_DELIVERY_THRESHOLD = 50;
    const DELIVERY_COST = 3.99;
    const VAT_RATE = 0.20;

    /* tracks current discount — set by applyPromo() */
    let discountPercent = 0;

    /* reads basket object from localstorage — written by products page when user clicks "+" */
    const getBasket = () => JSON.parse(localStorage.getItem('fm_basket') || '{}');

    /* saves updated basket back to localstorage after any quantity change */
    const saveBasket = b => localStorage.setItem('fm_basket', JSON.stringify(b));

    /* increments or decrements qty of an item — deletes it if qty reaches 0 */
    function changeQty(id, delta) {
      const b = getBasket();
      b[id] = (b[id] || 0) + delta;
      if (b[id] <= 0) delete b[id];
      saveBasket(b); render();
    }

    /* removes an item from the basket entirely regardless of quantity */
    function removeItem(id) {
      const b = getBasket();
      delete b[id];
      saveBasket(b); render();
    }

    /* validates the entered promo code and applies the discount if valid */
    function applyPromo() {
      const code = document.getElementById('promoInput').value.trim().toUpperCase();
      const msg  = document.getElementById('promoMsg');
      if (PROMO_CODES[code]) {
        discountPercent = PROMO_CODES[code];
        msg.textContent = `✅ Code applied — ${discountPercent}% off!`;
        msg.className = 'promo-msg success';
      } else {
        discountPercent = 0;
        msg.textContent = '❌ Invalid code. Try SAVE10 or FRESH5.';
        msg.className = 'promo-msg error';
      }
      updateSummary();
    }

    /* recalculates and updates all values in the order summary panel */
    function updateSummary() {
      const entries  = Object.entries(getBasket());
      const subtotal = entries.reduce((s, [id, qty]) => { const p = PRODUCTS.find(x => x.id == id); return p ? s + p.price * qty : s; }, 0);
      const discount = subtotal * (discountPercent / 100);
      const after    = subtotal - discount;
      const vat      = after * VAT_RATE;
      /* free delivery if order value after discount meets threshold */
      const delCost  = after >= FREE_DELIVERY_THRESHOLD ? 0 : DELIVERY_COST;
      const total    = after + vat + delCost;
      const qty      = entries.reduce((s, [,v]) => s + v, 0);

      /* update all text values in the summary panel */
      document.getElementById('subtotal').textContent       = `£${subtotal.toFixed(2)}`;
      document.getElementById('vat').textContent            = `£${vat.toFixed(2)}`;
      document.getElementById('discount').textContent       = `-£${discount.toFixed(2)}`;
      document.getElementById('total').textContent          = `£${total.toFixed(2)}`;
      document.getElementById('itemCountLabel').textContent = `${qty} item${qty !== 1 ? 's' : ''} in your cart`;
      document.getElementById('cartBadge').textContent      = qty;

      /* delivery label — free or show cost */
      const del = document.getElementById('delivery');
      del.textContent = delCost === 0 ? 'FREE' : `£${delCost.toFixed(2)}`;
      del.className   = delCost === 0 ? 'val-free' : '';

      /* delivery banner — shows remaining amount or success message */
      document.getElementById('deliveryMsg').textContent = delCost === 0
        ? '🎉 You qualify for free delivery!'
        : `Add £${(FREE_DELIVERY_THRESHOLD - after).toFixed(2)} more for free delivery!`;

      /* disable checkout link when basket is empty */
      const btn = document.getElementById('checkoutBtn');
      btn.style.pointerEvents = qty === 0 ? 'none' : 'auto';
      btn.style.opacity       = qty === 0 ? '0.5'  : '1';
    }

    /* builds all basket item rows and injects into the panel, or shows empty state */
    function render() {
      const entries = Object.entries(getBasket());
      const panel   = document.getElementById('basketPanel');

      /* show empty basket state if no items */
      if (!entries.length) {
        panel.innerHTML = `<div class="empty-state"><div style="font-size:3.5rem;margin-bottom:1rem">🛒</div><h3>Your basket is empty</h3><p>Looks like you haven't added anything yet.</p><a href="products.html" class="btn-shop">Start Shopping</a></div>`;
        updateSummary(); return;
      }

      /* calculate item total for the footer row at the bottom of the panel (asked ai to help me) */
      const itemTotal = entries.reduce((s, [id, qty]) => { const p = PRODUCTS.find(x => x.id == id); return p ? s + p.price * qty : s; }, 0);

      /* build html for each basket item row (asked ai to help me) */
      panel.innerHTML = entries.map(([id, qty], i) => {
        const p = PRODUCTS.find(x => x.id == id);
        if (!p) return '';
        return `<div class="basket-item" style="animation-delay:${i*0.05}s">
          <div class="item-img">${p.emoji}</div>
          <div class="item-info">
            <div class="item-name">${p.name}</div>
            <div class="item-cat">${p.cat}</div>
            <div class="item-price">£${p.price.toFixed(2)}</div>
          </div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button>
            <div class="qty-num">${qty}</div>
            <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem(${p.id})" title="Remove item">🗑️</button>
        </div>`;
      }).join('') + `<div class="item-total-row">Item total: <strong>£${itemTotal.toFixed(2)}</strong></div>`;

      updateSummary();
    }

    /* run on page load */
    render();
  </script>
</body>
</html>
