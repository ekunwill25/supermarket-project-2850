<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshMart Products</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
    }
    #product-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .product-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .price {
      font-weight: bold;
      color: green;
    }
    .category {
      font-size: 12px;
      color: gray;
    }
    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>FreshMart Products</h1>
<div id="product-list">Loading products...</div>

<script>
  const API = "";

  async function loadProducts() {
    const container = document.getElementById("product-list");

    try {
      const res = await fetch(`${API}/products`, {
        method: "GET"
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      const products = await res.json();
      container.innerHTML = "";

      products.forEach(p => {
        const div = document.createElement("div");
        div.className = "product-card";
        div.innerHTML = `
          <h3>${p.name}</h3>
          <p>${p.description || ""}</p>
          <p class="category">Category: ${p.category ? p.category.name : "N/A"}</p>
          <p class="price">£${Number(p.price).toFixed(2)}</p>
        `;
        container.appendChild(div);
      });
    } catch (err) {
      console.error("Fetch error:", err);
      container.innerHTML = `<p class="error">Could not load products from backend.</p>`;
    }
  }

  loadProducts();
</script>

</body>
</html>
