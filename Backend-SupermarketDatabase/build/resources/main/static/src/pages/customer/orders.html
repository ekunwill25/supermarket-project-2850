<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshMart — My Orders</title>
  <!-- bootstrap css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- google fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* base reset — matches all other customer pages */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }

    /* navbar */
    .top-nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0.75rem 2rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; }
    .logo-block { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; flex-shrink: 0; }
    .logo-icon { width: 42px; height: 42px; background: #2e7d32; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .logo-text strong { display: block; font-size: 1.05rem; color: #1a1a1a; line-height: 1.1; }
    .logo-text span { font-size: 0.72rem; color: #888; }
    .search-bar { flex: 1; max-width: 580px; display: flex; align-items: center; border: 1.5px solid #ddd; border-radius: 8px; padding: 0.45rem 0.9rem; gap: 0.5rem; }
    .search-bar input { border: none; outline: none; font-size: 0.9rem; color: #333; width: 100%; font-family: 'Inter', sans-serif; }
    .search-bar input::placeholder { color: #aaa; }
    .nav-actions { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
    .btn-login-nav { background: none; border: none; font-size: 0.9rem; color: #333; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; text-decoration: none; }
    .btn-login-nav:hover { color: #2e7d32; }
    .btn-signup-nav { background: #2e7d32; color: #fff; border: none; border-radius: 8px; padding: 0.45rem 1.1rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; transition: background 0.15s; }
    .btn-signup-nav:hover { background: #1b5e20; color: #fff; }
    .cart-btn-wrap { position: relative; }
    .cart-btn { background: #2e7d32; color: #fff; border-radius: 8px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; text-decoration: none; transition: background 0.15s; }
    .cart-btn:hover { background: #1b5e20; }
    .cart-badge { position: absolute; top: -6px; right: -6px; background: #e53935; color: #fff; border-radius: 50%; font-size: 0.65rem; font-weight: 700; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }

    /* secondary nav */
    .sub-nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 2rem; display: flex; gap: 0.25rem; }
    .sub-nav a { text-decoration: none; font-size: 0.9rem; font-weight: 500; color: #555; padding: 0.65rem 1rem; border-bottom: 2px solid transparent; transition: color 0.15s; }
    .sub-nav a:hover { color: #2e7d32; }
    /* orders link is active on this page */
    .sub-nav a.active { color: #2e7d32; border-bottom-color: #2e7d32; }

    /* page wrapper */
    .page-wrap { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; flex: 1; }

    /* page header row — title left, search/filter right */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-size: 1.6rem; font-weight: 700; }
    .page-subtitle { font-size: 0.875rem; color: #888; margin-top: 0.2rem; }

    /* filter tabs — All, Processing, Shipped, Delivered */
    .filter-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filter-tab { background: #fff; border: 1.5px solid #ddd; border-radius: 999px; padding: 0.4rem 1rem; font-size: 0.82rem; font-weight: 500; color: #555; cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif; }
    .filter-tab:hover { border-color: #2e7d32; color: #2e7d32; }
    /* active tab filled green */
    .filter-tab.active { background: #2e7d32; border-color: #2e7d32; color: #fff; }

    /* each order card */
    .order-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; margin-bottom: 1rem; overflow: hidden; transition: box-shadow 0.15s; animation: fadeUp 0.35s ease both; }
    .order-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

    /* order card header row — order id, date, status pill, total */
    .order-header { display: flex; align-items: center; gap: 1rem; padding: 1.1rem 1.5rem; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; }
    .order-id { font-size: 0.95rem; font-weight: 700; color: #1a1a1a; font-family: 'Inter', sans-serif; }
    .order-date { font-size: 0.82rem; color: #888; }
    .order-total { font-size: 0.95rem; font-weight: 700; color: #1a1a1a; margin-left: auto; }

    /* colour coded status pills */
    .status-pill { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; font-weight: 700; padding: 0.25rem 0.7rem; border-radius: 999px; white-space: nowrap; }
    .status-delivered  { background: #e8f5e9; color: #2e7d32; }
    .status-shipped    { background: #e3f2fd; color: #1565c0; }
    .status-processing { background: #fff8e1; color: #f57f17; }
    .status-cancelled  { background: #fdecea; color: #c62828; }

    /* order items row — product emojis and names */
    .order-items { padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .order-item  { display: flex; align-items: center; gap: 0.6rem; }
    .item-emoji  { width: 44px; height: 44px; background: #f5f5f5; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
    .item-detail { min-width: 0; }
    .item-name   { font-size: 0.82rem; font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .item-qty    { font-size: 0.72rem; color: #888; }

    /* order card footer — tracking info and action buttons */
    .order-footer { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.5rem; background: #fafafa; border-top: 1px solid #f0f0f0; gap: 1rem; flex-wrap: wrap; }
    .tracking-info { font-size: 0.8rem; color: #888; display: flex; align-items: center; gap: 0.4rem; }
    .order-actions { display: flex; gap: 0.5rem; }
    /* view details button */
    .btn-view { background: #fff; border: 1.5px solid #ddd; border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.82rem; font-weight: 500; color: #333; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; text-decoration: none; }
    .btn-view:hover { border-color: #2e7d32; color: #2e7d32; }
    /* reorder button */
    .btn-reorder { background: #2e7d32; border: none; border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.82rem; font-weight: 600; color: #fff; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s; }
    .btn-reorder:hover { background: #1b5e20; }

    /* delivery progress bar — shown for shipped/processing orders */
    .progress-wrap { padding: 0 1.5rem 1rem; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: #888; margin-bottom: 0.4rem; }
    .progress-bar-bg { height: 6px; background: #e5e5e5; border-radius: 999px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 999px; background: #2e7d32; transition: width 0.4s; }

    /* empty state — shown when no orders match the filter */
    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .empty-state p  { font-size: 0.875rem; color: #888; margin-bottom: 1.5rem; }
    .btn-shop { background: #2e7d32; color: #fff; border: none; border-radius: 8px; padding: 0.65rem 1.5rem; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.15s; }
    .btn-shop:hover { background: #1b5e20; color: #fff; }

    /* order detail modal overlay */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.show { display: flex; }
    .modal-card { background: #fff; border-radius: 16px; padding: 2rem; max-width: 520px; width: 100%; max-height: 85vh; overflow-y: auto; animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #888; padding: 0.25rem; border-radius: 6px; transition: background 0.15s; }
    .modal-close:hover { background: #f5f5f5; }
    .modal-row { display: flex; justify-content: space-between; font-size: 0.875rem; color: #555; padding: 0.5rem 0; border-bottom: 1px solid #f0f0f0; }
    .modal-row:last-child { border-bottom: none; }
    .modal-row strong { color: #1a1a1a; }
    .modal-section { font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #aaa; margin: 1rem 0 0.5rem; }
    .modal-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid #f5f5f5; }
    .modal-item:last-child { border-bottom: none; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn  { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    @media (max-width: 640px) {
      .top-nav .search-bar { display: none; }
      .order-header { gap: 0.5rem; }
      .order-total { margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- navbar -->
  <nav class="top-nav">
    <a href="../../index.html" class="logo-block">
      <div class="logo-icon">🛒</div>
      <div class="logo-text"><strong>FreshMart</strong><span>Online Supermarket</span></div>
    </a>
    <div class="search-bar"><span style="color:#aaa">🔍</span><input type="text" placeholder="Search for products..."></div>
    <div class="nav-actions">
      <a href="login.html"  class="btn-login-nav">Login</a>
      <a href="signup.html" class="btn-signup-nav">Sign Up</a>
      <button style="background:none;border:none;font-size:1.2rem;cursor:pointer">🤍</button>
      <button style="background:none;border:none;font-size:0.85rem;color:#333;cursor:pointer;font-family:'Inter',sans-serif">🎁 Orders</button>
      <div class="cart-btn-wrap">
        <a href="basket.html" class="cart-btn">🛒</a>
        <span class="cart-badge" id="cartBadge">0</span>
      </div>
    </div>
  </nav>

  <!-- secondary nav — orders tab is active on this page -->
  <div class="sub-nav">
    <a href="index.html">Shop</a>
    <a href="products.html">Offers</a>
    <a href="products.html">Categories</a>
  </div>

  <!-- page content -->
  <div class="page-wrap">

    <!-- page heading -->
    <div class="page-header">
      <div>
        <h1 class="page-title">My Orders</h1>
        <p class="page-subtitle" id="orderCountLabel">Loading...</p>
      </div>
    </div>

    <!-- filter tabs — click to filter by status -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">All Orders</button>
      <button class="filter-tab" onclick="setFilter('processing', this)">⏳ Processing</button>
      <button class="filter-tab" onclick="setFilter('shipped', this)">🚚 Shipped</button>
      <button class="filter-tab" onclick="setFilter('delivered', this)">✅ Delivered</button>
      <button class="filter-tab" onclick="setFilter('cancelled', this)">❌ Cancelled</button>
    </div>

    <!-- order cards injected here by render() -->
    <div id="ordersContainer"></div>

  </div>

  <!-- order detail modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-card" id="modalCard">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Order Details</span>
        <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- bootstrap js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* sample order history — replace with fetch('/api/orders') when backend is ready */
    const ORDERS = [
      {
        id: '#FM-3821', date: '22 Mar 2026', status: 'delivered', total: 24.50, delivery: 'Standard',
        address: '14 Maple Avenue, London, EC1A 1BB', payment: 'Credit Card',
        items: [{ emoji:'🍎', name:'Gala Apples', qty:2, price:2.49 }, { emoji:'🧀', name:'Cheddar Cheese', qty:1, price:3.49 }, { emoji:'🍗', name:'Chicken Breast', qty:3, price:4.99 }],
        progress: 100, tracking: 'Delivered on 24 Mar 2026'
      },
      {
        id: '#FM-3756', date: '18 Mar 2026', status: 'shipped', total: 16.30, delivery: 'Next Day',
        address: '14 Maple Avenue, London, EC1A 1BB', payment: 'PayPal',
        items: [{ emoji:'🍞', name:'Sourdough Loaf', qty:2, price:2.49 }, { emoji:'🥛', name:'Whole Milk', qty:3, price:1.45 }],
        progress: 65, tracking: 'Out for delivery — Est. arrival 20 Mar 2026'
      },
      {
        id: '#FM-3701', date: '14 Mar 2026', status: 'delivered', total: 41.80, delivery: 'Standard',
        address: '14 Maple Avenue, London, EC1A 1BB', payment: 'Credit Card',
        items: [{ emoji:'🍫', name:'Protein Bar, Variety Pack', qty:2, price:21.99 }, { emoji:'🥚', name:'Free Range Eggs', qty:1, price:2.79 }],
        progress: 100, tracking: 'Delivered on 16 Mar 2026'
      },
      {
        id: '#FM-3644', date: '09 Mar 2026', status: 'processing', total: 9.20, delivery: 'Standard',
        address: '14 Maple Avenue, London, EC1A 1BB', payment: 'Credit Card',
        items: [{ emoji:'🍓', name:'Strawberries', qty:2, price:3.49 }, { emoji:'🥦', name:'Broccoli', qty:2, price:0.89 }],
        progress: 20, tracking: 'Order confirmed — being prepared'
      },
      {
        id: '#FM-3590', date: '04 Mar 2026', status: 'cancelled', total: 13.45, delivery: 'Next Day',
        address: '14 Maple Avenue, London, EC1A 1BB', payment: 'Credit Card',
        items: [{ emoji:'🍌', name:'Ripe Bananas', qty:3, price:1.29 }, { emoji:'🧀', name:'Cheddar Cheese', qty:2, price:3.49 }],
        progress: 0, tracking: 'Order cancelled on 04 Mar 2026'
      },
    ];

    /* tracks the active filter — defaults to showing all orders */
    let activeFilter = 'all';

    /* status config — emoji, label and css class for each status */
    const STATUS = {
      delivered:  { emoji: '✅', label: 'Delivered',  cls: 'status-delivered'  },
      shipped:    { emoji: '🚚', label: 'Shipped',    cls: 'status-shipped'    },
      processing: { emoji: '⏳', label: 'Processing', cls: 'status-processing' },
      cancelled:  { emoji: '❌', label: 'Cancelled',  cls: 'status-cancelled'  },
    };

    /* updates the active filter and re-renders the order list */
    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    /* builds and injects all order cards for the current filter */
    function render() {
      const filtered = activeFilter === 'all' ? ORDERS : ORDERS.filter(o => o.status === activeFilter);
      const container = document.getElementById('ordersContainer');
      document.getElementById('orderCountLabel').textContent = `${filtered.length} order${filtered.length !== 1 ? 's' : ''} found`;

      /* show empty state if no orders match the filter */
      if (!filtered.length) {
        container.innerHTML = `<div class="empty-state"><div style="font-size:3rem;margin-bottom:1rem">📦</div><h3>No orders found</h3><p>You have no ${activeFilter === 'all' ? '' : activeFilter + ' '}orders yet.</p><a href="products.html" class="btn-shop">Start Shopping</a></div>`;
        return;
      }

      container.innerHTML = filtered.map((o, i) => {
        const s = STATUS[o.status];
        /* show progress bar for orders that are not delivered or cancelled */
        const showProgress = o.status === 'shipped' || o.status === 'processing';
        const progressHtml = showProgress ? `
          <div class="progress-wrap">
            <div class="progress-label"><span>Order placed</span><span>Preparing</span><span>Shipped</span><span>Delivered</span></div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${o.progress}%"></div></div>
          </div>` : '';

        return `<div class="order-card" style="animation-delay:${i*0.06}s">
          <div class="order-header">
            <div>
              <div class="order-id">${o.id}</div>
              <div class="order-date">${o.date}</div>
            </div>
            <span class="status-pill ${s.cls}">${s.emoji} ${s.label}</span>
            <div class="order-total">£${o.total.toFixed(2)}</div>
          </div>
          <div class="order-items">
            ${o.items.map(item => `
              <div class="order-item">
                <div class="item-emoji">${item.emoji}</div>
                <div class="item-detail">
                  <div class="item-name">${item.name}</div>
                  <div class="item-qty">Qty: ${item.qty}</div>
                </div>
              </div>`).join('')}
          </div>
          ${progressHtml}
          <div class="order-footer">
            <div class="tracking-info">📍 ${o.tracking}</div>
            <div class="order-actions">
              <button class="btn-view" onclick="openModal(${ORDERS.indexOf(o)})">View Details</button>
              ${o.status !== 'cancelled' ? `<button class="btn-reorder" onclick="reorder(${ORDERS.indexOf(o)})">Reorder</button>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');
    }

    /* opens the order detail modal for a specific order */
    function openModal(index) {
      const o = ORDERS[index];
      const s = STATUS[o.status];
      document.getElementById('modalTitle').textContent = `Order ${o.id}`;
      document.getElementById('modalBody').innerHTML = `
        <div class="modal-section">Order Info</div>
        <div class="modal-row"><span>Date</span><strong>${o.date}</strong></div>
        <div class="modal-row"><span>Status</span><span class="status-pill ${s.cls}">${s.emoji} ${s.label}</span></div>
        <div class="modal-row"><span>Delivery</span><strong>${o.delivery}</strong></div>
        <div class="modal-row"><span>Payment</span><strong>${o.payment}</strong></div>
        <div class="modal-row"><span>Address</span><strong>${o.address}</strong></div>
        <div class="modal-section">Items</div>
        ${o.items.map(item => `
          <div class="modal-item">
            <div style="font-size:1.6rem;width:38px;height:38px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;justify-content:center">${item.emoji}</div>
            <div style="flex:1"><div style="font-size:0.85rem;font-weight:600">${item.name}</div><div style="font-size:0.75rem;color:#888">Qty: ${item.qty}</div></div>
            <div style="font-size:0.875rem;font-weight:700">£${(item.price * item.qty).toFixed(2)}</div>
          </div>`).join('')}
        <div class="modal-section">Total</div>
        <div class="modal-row"><span>Order Total</span><strong style="color:#2e7d32;font-size:1rem">£${o.total.toFixed(2)}</strong></div>`;
      document.getElementById('modalOverlay').classList.add('show');
    }

    /* closes modal when clicking outside the modal card */
    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay'))
        document.getElementById('modalOverlay').classList.remove('show');
    }

    /* adds all items from a previous order back to the basket */
    function reorder(index) {
      const o = ORDERS[index];
      const basket = JSON.parse(localStorage.getItem('fm_basket') || '{}');
      o.items.forEach(item => {
        /* find the product id by matching the name */
        basket[index * 10 + o.items.indexOf(item) + 1] = (basket[index * 10 + o.items.indexOf(item) + 1] || 0) + item.qty;
      });
      localStorage.setItem('fm_basket', JSON.stringify(basket));
      window.location.href = 'basket.html';
    }

    /* updates the cart badge from localstorage */
    function updateCartBadge() {
      const b = JSON.parse(localStorage.getItem('fm_basket') || '{}');
      document.getElementById('cartBadge').textContent = Object.values(b).reduce((s,v) => s+v, 0);
    }

    /* run on page load */
    render();
    updateCartBadge();
  </script>
</body>
</html>
